name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o site
        uses: actions/checkout@v4

      - name: Preparar os arquivos
        run: |
          mkdir _site
          rsync -a --exclude '.git' --exclude '.github' --exclude '_site' ./ _site/

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
