name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "scripts/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gerar páginas a partir dos arquivos Markdown
        env:
          BASE_PATH: /predator-news
        run: npm run build

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar o site gerado
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
